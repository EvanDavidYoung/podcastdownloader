<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transcript Player</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }

        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 30px;
        }

        .drop-zone {
            border: 3px dashed #4a4a6a;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            background: #252542;
        }

        .drop-zone:hover, .drop-zone.drag-over {
            border-color: #6c63ff;
            background: #2d2d4a;
        }

        .drop-zone h3 {
            margin: 0 0 10px 0;
            color: #aaa;
        }

        .drop-zone p {
            margin: 0;
            color: #666;
            font-size: 14px;
        }

        .file-status {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .file-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .file-badge.loaded {
            background: #2d5a3d;
            color: #7dce94;
        }

        .file-badge.pending {
            background: #3a3a5a;
            color: #888;
        }

        .file-badge .icon {
            font-size: 16px;
        }

        .player-container {
            background: #252542;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            display: none;
        }

        .player-container.visible {
            display: block;
        }

        audio {
            width: 100%;
            margin-bottom: 15px;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        button {
            background: #6c63ff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        button:hover {
            background: #5a52d5;
        }

        button:disabled {
            background: #4a4a6a;
            cursor: not-allowed;
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }

        .speed-control label {
            color: #aaa;
            font-size: 14px;
        }

        .speed-control select {
            background: #3a3a5a;
            color: #eee;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
        }

        .transcript-container {
            background: #252542;
            border-radius: 12px;
            padding: 20px;
            max-height: 500px;
            overflow-y: auto;
            display: none;
        }

        .transcript-container.visible {
            display: block;
        }

        .segment {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #3a3a5a;
        }

        .segment:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .segment-time {
            font-size: 12px;
            color: #6c63ff;
            margin-bottom: 8px;
            font-family: monospace;
        }

        .segment-text {
            line-height: 1.8;
        }

        .word {
            display: inline;
            padding: 2px 1px;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .word:hover {
            background: #3a3a5a;
        }

        .word.active {
            background: #6c63ff;
            color: white;
        }

        .word.low-confidence {
            border-bottom: 2px dotted #ff6b6b;
        }

        .legend {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #3a3a5a;
            font-size: 13px;
            color: #888;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        .legend-dot.active {
            background: #6c63ff;
        }

        .legend-dot.low {
            background: transparent;
            border-bottom: 2px dotted #ff6b6b;
            height: 0;
            width: 20px;
        }

        .confidence-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .confidence-toggle input {
            cursor: pointer;
        }

        .confidence-toggle label {
            color: #aaa;
            font-size: 14px;
            cursor: pointer;
        }

        .current-word-display {
            text-align: center;
            font-size: 24px;
            padding: 15px;
            background: #1a1a2e;
            border-radius: 8px;
            margin-bottom: 15px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .time-display {
            font-family: monospace;
            color: #6c63ff;
            font-size: 14px;
        }

        /* Scrollbar styling */
        .transcript-container::-webkit-scrollbar {
            width: 8px;
        }

        .transcript-container::-webkit-scrollbar-track {
            background: #1a1a2e;
            border-radius: 4px;
        }

        .transcript-container::-webkit-scrollbar-thumb {
            background: #4a4a6a;
            border-radius: 4px;
        }

        .transcript-container::-webkit-scrollbar-thumb:hover {
            background: #6c63ff;
        }
    </style>
</head>
<body>
    <h1>Transcript Player</h1>

    <div class="drop-zone" id="dropZone">
        <h3>Drop Files Here</h3>
        <p>Drop your .mp3 and .json files (or click to browse)</p>
        <input type="file" id="fileInput" multiple accept=".mp3,.json" style="display: none;">
    </div>

    <div class="file-status">
        <div class="file-badge pending" id="audioBadge">
            <span class="icon">🎵</span>
            <span id="audioStatus">No audio loaded</span>
        </div>
        <div class="file-badge pending" id="jsonBadge">
            <span class="icon">📄</span>
            <span id="jsonStatus">No transcript loaded</span>
        </div>
    </div>

    <div class="player-container" id="playerContainer">
        <div class="current-word-display" id="currentWordDisplay">
            <span class="time-display" id="timeDisplay">0:00 / 0:00</span>
        </div>
        <audio id="audioPlayer" controls></audio>
        <div class="controls">
            <button id="playPauseBtn" disabled>Play</button>
            <button id="rewindBtn" disabled>-5s</button>
            <button id="forwardBtn" disabled>+5s</button>
            <div class="confidence-toggle">
                <input type="checkbox" id="showLowConfidence" checked>
                <label for="showLowConfidence">Highlight low confidence</label>
            </div>
            <div class="speed-control">
                <label>Speed:</label>
                <select id="speedSelect">
                    <option value="0.5">0.5x</option>
                    <option value="0.75">0.75x</option>
                    <option value="1" selected>1x</option>
                    <option value="1.25">1.25x</option>
                    <option value="1.5">1.5x</option>
                    <option value="2">2x</option>
                </select>
            </div>
        </div>
    </div>

    <div class="transcript-container" id="transcriptContainer">
        <div id="transcriptContent"></div>
        <div class="legend">
            <div class="legend-item">
                <div class="legend-dot active"></div>
                <span>Currently playing</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot low"></div>
                <span>Low confidence (&lt;0.5)</span>
            </div>
        </div>
    </div>

    <script>
        // State
        let transcriptData = null;
        let audioLoaded = false;
        let allWords = [];

        // DOM elements
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const audioPlayer = document.getElementById('audioPlayer');
        const playerContainer = document.getElementById('playerContainer');
        const transcriptContainer = document.getElementById('transcriptContainer');
        const transcriptContent = document.getElementById('transcriptContent');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const rewindBtn = document.getElementById('rewindBtn');
        const forwardBtn = document.getElementById('forwardBtn');
        const speedSelect = document.getElementById('speedSelect');
        const showLowConfidence = document.getElementById('showLowConfidence');
        const audioBadge = document.getElementById('audioBadge');
        const jsonBadge = document.getElementById('jsonBadge');
        const audioStatus = document.getElementById('audioStatus');
        const jsonStatus = document.getElementById('jsonStatus');
        const currentWordDisplay = document.getElementById('currentWordDisplay');
        const timeDisplay = document.getElementById('timeDisplay');

        // Drag and drop handlers
        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drag-over');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            for (const file of files) {
                if (file.name.endsWith('.mp3') || file.type === 'audio/mpeg') {
                    loadAudio(file);
                } else if (file.name.endsWith('.json') || file.type === 'application/json') {
                    loadTranscript(file);
                }
            }
        }

        function loadAudio(file) {
            const url = URL.createObjectURL(file);
            audioPlayer.src = url;
            audioLoaded = true;
            audioBadge.classList.remove('pending');
            audioBadge.classList.add('loaded');
            audioStatus.textContent = file.name;
            checkReady();
        }

        function loadTranscript(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    transcriptData = JSON.parse(e.target.result);
                    jsonBadge.classList.remove('pending');
                    jsonBadge.classList.add('loaded');
                    jsonStatus.textContent = file.name;
                    renderTranscript();
                    checkReady();
                } catch (err) {
                    alert('Error parsing JSON file: ' + err.message);
                }
            };
            reader.readAsText(file);
        }

        function checkReady() {
            if (audioLoaded && transcriptData) {
                playerContainer.classList.add('visible');
                transcriptContainer.classList.add('visible');
                playPauseBtn.disabled = false;
                rewindBtn.disabled = false;
                forwardBtn.disabled = false;
            }
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function renderTranscript() {
            if (!transcriptData || !transcriptData.segments) return;

            allWords = [];
            let html = '';

            transcriptData.segments.forEach((segment, segIdx) => {
                html += `<div class="segment">`;
                html += `<div class="segment-time">${formatTime(segment.start)} - ${formatTime(segment.end)}</div>`;
                html += `<div class="segment-text">`;

                if (segment.words) {
                    segment.words.forEach((word, wordIdx) => {
                        const globalIdx = allWords.length;
                        allWords.push(word);
                        const lowConf = word.score < 0.5 ? 'low-confidence' : '';
                        html += `<span class="word ${lowConf}" data-idx="${globalIdx}" data-start="${word.start}" data-end="${word.end}">${word.word}</span>`;
                    });
                } else {
                    html += segment.text;
                }

                html += `</div></div>`;
            });

            transcriptContent.innerHTML = html;

            // Add click handlers to words
            document.querySelectorAll('.word').forEach(el => {
                el.addEventListener('click', () => {
                    const start = parseFloat(el.dataset.start);
                    audioPlayer.currentTime = start;
                    if (audioPlayer.paused) {
                        audioPlayer.play();
                    }
                });
            });

            updateLowConfidenceDisplay();
        }

        function updateLowConfidenceDisplay() {
            const show = showLowConfidence.checked;
            document.querySelectorAll('.word.low-confidence').forEach(el => {
                el.style.borderBottom = show ? '2px dotted #ff6b6b' : 'none';
            });
        }

        showLowConfidence.addEventListener('change', updateLowConfidenceDisplay);

        // Playback controls
        playPauseBtn.addEventListener('click', () => {
            if (audioPlayer.paused) {
                audioPlayer.play();
            } else {
                audioPlayer.pause();
            }
        });

        rewindBtn.addEventListener('click', () => {
            audioPlayer.currentTime = Math.max(0, audioPlayer.currentTime - 5);
        });

        forwardBtn.addEventListener('click', () => {
            audioPlayer.currentTime = Math.min(audioPlayer.duration, audioPlayer.currentTime + 5);
        });

        speedSelect.addEventListener('change', () => {
            audioPlayer.playbackRate = parseFloat(speedSelect.value);
        });

        audioPlayer.addEventListener('play', () => {
            playPauseBtn.textContent = 'Pause';
        });

        audioPlayer.addEventListener('pause', () => {
            playPauseBtn.textContent = 'Play';
        });

        // Time update - highlight current word
        audioPlayer.addEventListener('timeupdate', () => {
            const currentTime = audioPlayer.currentTime;
            const duration = audioPlayer.duration || 0;

            timeDisplay.textContent = `${formatTime(currentTime)} / ${formatTime(duration)}`;

            // Remove all active classes
            document.querySelectorAll('.word.active').forEach(el => {
                el.classList.remove('active');
            });

            // Find and highlight current word
            let currentWord = null;
            for (let i = 0; i < allWords.length; i++) {
                const word = allWords[i];
                if (currentTime >= word.start && currentTime <= word.end) {
                    currentWord = word;
                    const el = document.querySelector(`.word[data-idx="${i}"]`);
                    if (el) {
                        el.classList.add('active');
                        // Scroll into view if needed
                        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                    break;
                }
            }

            // Update current word display
            if (currentWord) {
                currentWordDisplay.innerHTML = `<span style="font-size: 32px;">${currentWord.word}</span>`;
            }
        });

        audioPlayer.addEventListener('loadedmetadata', () => {
            timeDisplay.textContent = `0:00 / ${formatTime(audioPlayer.duration)}`;
        });
    </script>
</body>
</html>
