<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podcast Downloader</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .hero {
            text-align: center;
            max-width: 560px;
        }

        .icon {
            font-size: 56px;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 36px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 12px;
        }

        .tagline {
            font-size: 16px;
            color: #888;
            line-height: 1.6;
            margin-bottom: 48px;
        }

        .links {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            transition: opacity 0.15s, transform 0.15s;
        }

        .btn:hover {
            opacity: 0.85;
            transform: translateY(-1px);
        }

        .btn-primary {
            background: #6c63ff;
            color: #fff;
        }

        .btn-secondary {
            background: #2a2a4a;
            color: #ddd;
            border: 1px solid #3a3a5a;
        }

        .btn svg {
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="icon">🎙️</div>
        <h1>Podcast Downloader</h1>
        <p class="tagline">Download podcast episodes and generate synchronized transcripts — with support for Chinese word-level alignment.</p>
        <div class="links">
            <a href="/player" class="btn btn-primary">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M8 5v14l11-7z"/>
                </svg>
                Open Player
            </a>
            <a href="https://github.com/EvanDavidYoung/podcastdownloader" class="btn btn-secondary" target="_blank" rel="noopener">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0 1 12 6.836a9.59 9.59 0 0 1 2.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.744 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
                </svg>
                View on GitHub
            </a>
        </div>
    </div>
</body>
</html>
